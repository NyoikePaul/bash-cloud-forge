name: Bash Expert CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run ShellCheck (Strict)
        run: |
          echo "🔍 Running ShellCheck on all .sh files..."
          find . -type f -name "*.sh" -exec shellcheck --severity=error {} +

      - name: Check Bash Formatting (shfmt)
        run: |
          echo "📏 Checking formatting with shfmt..."
          shfmt -d -i 2 -ci -s .

      - name: Verify Executable Permissions
        run: |
          echo "🔧 Checking executable permissions..."
          find . -type f \( -name "*.sh" -o -name "forge.sh" -o -name "deploy.sh" -o -name "provision.sh" \) ! -executable -print0 | 
            xargs -0 -I {} sh -c 'echo "⚠️ Missing +x on: {}" && exit 1' || echo "✅ All scripts are executable"

      - name: Test Script Syntax
        run: |
          echo "🧪 Checking bash syntax..."
          find . -type f -name "*.sh" -exec bash -n {} \;
